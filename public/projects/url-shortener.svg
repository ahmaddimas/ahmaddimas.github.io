<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004ac6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header Bar -->
  <rect x="0" y="0" width="800" height="64" fill="#ffffff" opacity="0.9"/>
  <rect x="0" y="63" width="800" height="1" fill="#e2e8f0"/>
  <rect x="40" y="24" width="140" height="16" rx="8" fill="url(#accent)"/>
  <rect x="600" y="24" width="80" height="16" rx="8" fill="#e2e8f0"/>
  <rect x="696" y="24" width="64" height="16" rx="8" fill="url(#accent)"/>

  <!-- Main Card -->
  <rect x="40" y="96" width="720" height="320" rx="16" fill="url(#card)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- URL Shortener Input -->
  <rect x="80" y="136" width="640" height="72" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="104" y="160" width="400" height="12" rx="6" fill="#cbd5e1"/>
  <rect x="530" y="152" width="160" height="40" rx="8" fill="url(#accent)"/>
  <rect x="570" y="168" width="80" height="8" rx="4" fill="#ffffff" opacity="0.8"/>

  <!-- Result Section -->
  <rect x="80" y="232" width="640" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="104" y="256" width="200" height="12" rx="6" fill="url(#accent)" opacity="0.3"/>
  <rect x="104" y="280" width="160" height="10" rx="5" fill="#94a3b8"/>
  <rect x="640" y="256" width="56" height="32" rx="8" fill="#dbe1ff"/>
  <rect x="648" y="268" width="40" height="8" rx="4" fill="url(#accent)"/>

  <!-- Stats Dashboard -->
  <rect x="80" y="336" width="200" height="56" rx="8" fill="#f1f5f9"/>
  <rect x="104" y="352" width="80" height="10" rx="5" fill="#94a3b8"/>
  <rect x="104" y="372" width="60" height="8" rx="4" fill="url(#accent)"/>

  <rect x="300" y="336" width="200" height="56" rx="8" fill="#f1f5f9"/>
  <rect x="324" y="352" width="80" height="10" rx="5" fill="#94a3b8"/>
  <rect x="324" y="372" width="60" height="8" rx="4" fill="#10b981"/>

  <rect x="520" y="336" width="200" height="56" rx="8" fill="#f1f5f9"/>
  <rect x="544" y="352" width="80" height="10" rx="5" fill="#94a3b8"/>
  <rect x="544" y="372" width="60" height="8" rx="4" fill="#f59e0b"/>

  <!-- Link Chain Icon -->
  <circle cx="720" cy="120" r="28" fill="url(#accent)" opacity="0.1"/>
  <circle cx="720" cy="120" r="20" fill="url(#accent)" opacity="0.15"/>
  <text x="720" y="128" text-anchor="middle" font-family="monospace" font-size="16" fill="url(#accent)" font-weight="bold">🔗</text>

  <!-- Bottom Tags -->
  <rect x="80" y="416" width="80" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="172" y="416" width="80" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="264" y="416" width="80" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
</svg>
