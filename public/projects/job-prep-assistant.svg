<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004ac6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)"/>
  <rect width="800" height="480" fill="url(#grid)"/>

  <!-- Header Bar -->
  <rect x="0" y="0" width="800" height="56" fill="#ffffff" opacity="0.9"/>
  <rect x="0" y="55" width="800" height="1" fill="#e2e8f0"/>
  <circle cx="32" cy="28" r="12" fill="url(#accent)"/>
  <rect x="56" y="22" width="140" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="600" y="22" width="80" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="696" y="22" width="80" height="12" rx="6" fill="#e2e8f0"/>

  <!-- Main Content Area -->
  <rect x="40" y="88" width="360" height="200" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="64" y="112" width="180" height="16" rx="8" fill="url(#accent)"/>
  <rect x="64" y="144" width="280" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="64" y="164" width="240" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="64" y="184" width="200" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="64" y="220" width="120" height="32" rx="8" fill="url(#accent)"/>
  <rect x="200" y="228" width="80" height="16" rx="8" fill="#e2e8f0"/>

