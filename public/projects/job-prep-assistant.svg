  <rect x="420" y="88" width="340" height="320" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="444" y="112" width="200" height="12" rx="6" fill="url(#accent)" opacity="0.2"/>
  <rect x="444" y="140" width="292" height="48" rx="8" fill="#f1f5f9"/>
  <rect x="460" y="152" width="200" height="8" rx="4" fill="#94a3b8"/>
  <rect x="460" y="168" width="160" height="8" rx="4" fill="#94a3b8"/>
  <rect x="444" y="204" width="292" height="48" rx="8" fill="url(#accent)" opacity="0.1"/>
  <rect x="460" y="216" width="200" height="8" rx="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="460" y="232" width="160" height="8" rx="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="444" y="268" width="292" height="48" rx="8" fill="#f1f5f9"/>
  <rect x="460" y="280" width="200" height="8" rx="4" fill="#94a3b8"/>
  <rect x="460" y="296" width="160" height="8" rx="4" fill="#94a3b8"/>
  <rect x="444" y="352" width="292" height="40" rx="8" fill="#f1f5f9"/>
  <rect x="460" y="364" width="200" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="708" y="364" width="16" height="16" rx="8" fill="url(#accent)"/>

  <!-- Analysis Panel -->
  <rect x="40" y="308" width="360" height="100" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="64" y="332" width="120" height="12" rx="6" fill="url(#accent)" opacity="0.2"/>
  <rect x="64" y="360" width="100" height="32" rx="8" fill="#dbe1ff"/>
  <rect x="180" y="360" width="100" height="32" rx="8" fill="#dbe1ff"/>
  <rect x="296" y="360" width="80" height="32" rx="8" fill="#dbe1ff"/>

  <!-- Tech Stack Icons -->
  <rect x="40" y="428" width="80" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="132" y="428" width="80" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="224" y="428" width="100" height="24" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Floating Elements -->
  <circle cx="720" cy="120" r="24" fill="url(#accent)" opacity="0.1"/>
  <circle cx="720" cy="120" r="16" fill="url(#accent)" opacity="0.2"/>
  <text x="720" y="126" text-anchor="middle" font-family="monospace" font-size="14" fill="url(#accent)" font-weight="bold">AI</text>
